<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Media Bed</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#eee;font-family:-apple-system,sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:20px}
h1{font-size:18px;margin:16px 0 8px;opacity:.7}
.url-box{background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:12px 16px;margin:8px 0;font-size:13px;word-break:break-all;max-width:90vw;cursor:pointer;position:relative}
.url-box:hover{border-color:#555}
.url-box::after{content:"点击复制";position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:11px;opacity:.4}
.url-box:active::after{content:"已复制 ✓";opacity:1}
video{max-width:90vw;max-height:70vh;border-radius:12px;background:#000}
label{font-size:13px;opacity:.5;margin:12px 0 4px}
input[type=text]{width:90vw;max-width:600px;background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:10px 14px;color:#eee;font-size:14px;outline:none}
input:focus{border-color:#4a9eff}
.btn{margin:8px;padding:10px 24px;background:#4a9eff;border:none;border-radius:8px;color:#fff;font-size:14px;cursor:pointer}
.btn:active{opacity:.8}
.info{font-size:12px;opacity:.4;margin-top:8px}
</style>
</head>
<body>
<video id="player" controls autoplay playsinline>
  <source id="src" src="" type="video/mp4">
</video>
<label>粘贴文件链接（支持 GitHub Release / raw / 任意直链）</label>
<div style="display:flex;gap:8px;width:90vw;max-width:600px">
  <input type="text" id="url" placeholder="https://github.com/.../video.mp4">
  <button class="btn" onclick="play()">播放</button>
</div>
<div class="url-box" id="proxyUrl" onclick="copyUrl()"></div>
<div class="info">国内加速: 自动在链接前加 ghfast.top 代理</div>
<script>
const PROXY='https://ghfast.top/';
function play(){
  let u=document.getElementById('url').value.trim();
  if(!u)return;
  let proxied=PROXY+u;
  document.getElementById('src').src=proxied;
  document.getElementById('player').load();
  document.getElementById('proxyUrl').textContent=proxied;
}
function copyUrl(){
  let t=document.getElementById('proxyUrl').textContent;
  if(t)navigator.clipboard.writeText(t);
}
// Auto-detect hash params
let h=location.hash.slice(1);
if(h){document.getElementById('url').value=decodeURIComponent(h);play();}
</script>
</body>
</html>
